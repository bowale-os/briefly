# Alembic Configuration for Briefly Backend
# Run alembic commands from backend/ directory

[alembic]
# Path to migration scripts (relative to this alembic.ini)
script_location = alembic
version_table = alembic_version
# version_table_schema = public  # Uncomment if using custom schema

# Add current directory to Python path
prepend_sys_path = .

# Database connection - uses DATABASE_URL environment variable
sqlalchemy.url = postgresql+psycopg://neondb_owner:npg_2PJ8nGhUQAzk@ep-dark-sunset-aiwjqf4c-pooler.c-4.us-east-1.aws.neon.tech/neondb

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console

[logger_alembic]
level = INFO
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Post-write hooks (optional)
[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME
